# Configuration for static-php-cli
# Build minimal PHP binary for IsItDarkApi

php:
  version: "8.2"
  extensions:
    required:
      - ctype
      - filter
      - json
      - mbstring
      - openssl
      - pcre
      - session
      - sockets
      - tokenizer
      - xml
    optional:
      - curl
      - fileinfo
      - iconv
      - intl
      - posix
      - readline
      - zlib

# Build settings
build:
  os: linux
  arch: x86_64
  
# Output
output:
  name: "php"
  path: "./build/php"
