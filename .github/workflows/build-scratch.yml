name: Build and Deploy Scratch Image

on:
  push:
    tags: ['v*']
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-scratch:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download SPC binary
        run: |
          curl -fsSL -o spc https://dl.static-php.dev/static-php-cli/spc-bin/nightly/spc-linux-x86_64
          chmod +x spc

      - name: Cache static PHP build
        id: cache-php
        uses: actions/cache@v4
        with:
          path: buildroot/
          key: spc-php-${{ hashFiles('craft.yml') }}-${{ hashFiles('spc') }}

      - name: Build static PHP binary
        if: steps.cache-php.outputs.cache-hit != 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ./spc craft --with-clean

      - name: Use cached PHP binary
        if: steps.cache-php.outputs.cache-hit == 'true'
        run: |
          echo "✅ Using cached PHP binary"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env. IMAGE_NAME }}
          flavor: |
            suffix=-scratch
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest-scratch

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.scratch
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Show image size
        run: |
          docker images ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }} --format "table {{.Repository}}:{{.Tag}}\t{{.Size}}"

      - name: Test image
        run: |
          IMAGE_NAME_LOWER=$(echo "${{ env.IMAGE_NAME }}" | tr '[:upper:]' '[:lower:]')
          # Remove 'v' prefix from version tag (v1.0.3 -> 1.0.3)
          VERSION=$(echo "${{ github.ref_name }}" | sed 's/^v//')
          IMAGE_TAG="${{ env.REGISTRY }}/${IMAGE_NAME_LOWER}:${VERSION}-scratch"
          
          echo "Testing image: $IMAGE_TAG"
          
          # Run container in background
          docker run -d --name test-app -p 8787:8787 $IMAGE_TAG
          
          # Wait for startup
          sleep 5
          
          # Debug: check container status and logs
          echo "Container status:"
          docker ps -a
          echo "Container logs:"
          docker logs test-app 2>&1 || true
          
          # Test health endpoint
          curl -f http://localhost:8787/ || exit 1
          
          # Test API endpoint
          curl -f "http://localhost:8787/api/v1/is-dark?lat=52.2297&lng=21.0122" || exit 1
          
          echo "✅ All tests passed!"
          
          # Cleanup
          docker stop test-app
          docker rm test-app
