<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Is It Dark?</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            height: 100vh;
            margin: 0;
            color: #fff;
            overflow: hidden;
        }

        .container {
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            background: none;
            backdrop-filter: none;
            padding: 0;
            border-radius: 0;
        }

        .main-content {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        .sidebar {
            width: 320px;
            background: rgba(26, 26, 46, 0.95);
            backdrop-filter: blur(10px);
            border-left: 1px solid rgba(255,255,255,0.1);
            padding: 20px;
            overflow-y: auto;
            display: none;
        }

        .sidebar.visible {
            display: block;
        }

        .sidebar h2 {
            font-size: 1.3rem;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .info-group {
            margin-bottom: 15px;
        }

        .info-label {
            font-size: 0.85rem;
            color: rgba(255,255,255,0.6);
            margin-bottom: 5px;
        }

        .info-value {
            font-size: 1rem;
            font-weight: 500;
        }

        .info-value.highlight {
            color: #4a9eff;
        }

        .state-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 600;
            text-transform: uppercase;
        }

        .state-badge.day { background: #f59e0b; }
        .state-badge.civil_twilight { background: #f97316; }
        .state-badge.nautical_twilight { background: #8b5cf6; }
        .state-badge.astronomical_twilight { background: #6366f1; }
        .state-badge.night { background: #4a9eff; }

        .top-bar {
            display: flex;
            align-items: center;
            gap: 20px;
            padding: 15px 20px;
            background: rgba(26, 26, 46, 0.9);
            backdrop-filter: blur(10px);
            z-index: 100;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            flex-wrap: wrap;
        }

        .top-bar h1 {
            font-size: 1.8rem;
            margin: 0;
            white-space: nowrap;
        }

        .input-row {
            display: flex;
            flex: 1;
            gap: 10px;
            align-items: center;
            min-width: 300px;
        }

        .input-group {
            display: flex;
            gap: 10px;
            flex-wrap: nowrap;
        }

        input[type="text"], input[type="number"] {
            width: 100%;
            padding: 10px 14px;
            border: 2px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            background: rgba(0,0,0,0.3);
            color: #fff;
            font-size: 15px;
            outline: none;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus, input[type="number"]:focus {
            border-color: #4a9eff;
        }

        button {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            background: #4a9eff;
            color: #fff;
            font-size: 15px;
            cursor: pointer;
            transition: background 0.3s;
            white-space: nowrap;
        }

        button:hover {
            background: #3a8eef;
        }

        button.secondary {
            background: rgba(255,255,255,0.1);
        }

        button.secondary:hover {
            background: rgba(255,255,255,0.2);
        }

        .map-container {
            flex: 1;
            width: 100%;
            background: #000;
            position: relative;
            overflow: hidden;
            cursor: crosshair;
            user-select: none;
        }

        #map-viewport {
            width: 950px;
            height: 620px;
            transform-origin: 0 0;
            transition: transform 0.05s ease-out;
        }

        #map-viewport svg {
            width: 100%;
            height: 100%;
        }

        #map-viewport path {
            fill: #2a3f5f;
            stroke: #4a6fa5;
            stroke-width: 0.5;
            transition: fill 0.3s;
        }

        #map-viewport path:hover {
            fill: #4a6fa5;
        }

        .map-controls {
            position: absolute;
            right: 20px;
            top: 20px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            z-index: 10;
        }

        .map-controls button {
            width: 44px;
            height: 44px;
            padding: 0;
            font-size: 24px;
            font-weight: bold;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .loading {
            opacity: 0.5;
            pointer-events: none;
        }

        .error {
            color: #ff6b6b;
            margin-top: 10px;
            text-align: center;
        }

        .autocomplete {
            position: relative;
        }

        .autocomplete-items {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: rgba(0,0,0,0.9);
            border-radius: 0 0 10px 10px;
            max-height: 200px;
            overflow-y: auto;
            z-index: 100;
        }

        .autocomplete-item {
            padding: 10px 16px;
            cursor: pointer;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .autocomplete-item:hover {
            background: rgba(255,255,255,0.1);
        }

        .autocomplete-item:last-child {
            border-bottom: none;
        }

        .marker {
            position: absolute;
            width: 20px;
            height: 20px;
            background: #ff4444;
            border: 3px solid #fff;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 10;
            box-shadow: 0 0 10px rgba(255,68,68,0.5);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="top-bar">
            <h1>Is It Dark?</h1>

            <div class="input-row">
                <div class="input-group autocomplete" style="flex: 2;">
                    <input type="text" id="cityInput" placeholder="Search city..." autocomplete="off">
                    <div id="autocompleteList" class="autocomplete-items" style="display:none;"></div>
                </div>

                <div class="input-group" style="flex: 1;">
                    <input type="number" id="latInput" placeholder="Lat" step="0.01" min="-90" max="90">
                </div>
                <div class="input-group" style="flex: 1;">
                    <input type="number" id="lngInput" placeholder="Lng" step="0.01" min="-180" max="180">
                </div>

                <button onclick="checkLocation()">Check</button>
                <button class="secondary" onclick="useMyLocation()" title="Use My Location">📍</button>
                <button class="secondary" onclick="clearAll()" title="Clear">✕</button>
            </div>
        </div>

        <div class="main-content">
            <div class="map-container" id="mapContainer">
                <div id="map-viewport"></div>
                <div id="marker" class="marker" style="display:none;"></div>
                <div class="map-controls">
                    <button onclick="zoomMap(1.2)">+</button>
                    <button onclick="zoomMap(0.8)">−</button>
                </div>
            </div>

            <div id="sidebar" class="sidebar">
                <h2>Sun Information</h2>
                <div id="sidebarContent"></div>
            </div>
        </div>

        <div id="error" class="error"></div>
    </div>

    <script>
        let currentScale = 1;
        let offsetX = 0;
        let offsetY = 0;
        let isDragging = false;
        let lastMouseX = 0;
        let lastMouseY = 0;
        let dragDistance = 0;
        let currentLat = 0;
        let currentLng = 0;
        let cities = [];
        const mapWidth = 950;
        const mapHeight = 500;

        // Load cities data
        async function loadCities() {
            try {
                const response = await fetch('/api/cities');
                if (response.ok) {
                    cities = await response.json();
                }
            } catch (e) {
                console.error('Failed to load cities:', e);
            }
        }

        // Initialize
        loadCities();
        loadMap();

        // Re-fit map when container resizes (e.g. sidebar opens/closes)
        new ResizeObserver(() => fitMapToContainer()).observe(document.getElementById('mapContainer'));

        // Map functions
        function loadMap() {
            fetch('/map/world.svg')
                .then(r => r.text())
                .then(svg => {
                    const parser = new DOMParser();
                    const doc = parser.parseFromString(svg, 'image/svg+xml');
                    const svgElement = doc.querySelector('svg');
                    if (svgElement) {
                        svgElement.id = 'map';
                        svgElement.setAttribute('preserveAspectRatio', 'xMidYMid slice');
                        const viewport = document.getElementById('map-viewport');
                        viewport.innerHTML = '';
                        viewport.appendChild(svgElement);
                        svgElement.addEventListener('click', onMapClick);
                        
                        // Add pan/zoom listeners
                        initMapInteractions();
                        
                        // Initial fit
                        fitMapToContainer();
                    }
                })
                .catch(err => {
                    console.error('Failed to load map:', err);
                    document.getElementById('map-viewport').innerHTML = '<div style="text-align:center;padding-top:180px;color:#666;">Failed to load map</div>';
                });
        }

        function fitMapToContainer() {
            const container = document.getElementById('mapContainer');
            const rect = container.getBoundingClientRect();
            
            const scaleX = rect.width / mapWidth;
            const scaleY = rect.height / mapHeight;
            
            // Choose the smaller scale so the entire map fits
            currentScale = Math.min(scaleX, scaleY);
            
            // Center the map
            offsetX = (rect.width - mapWidth * currentScale) / 2;
            offsetY = (rect.height - mapHeight * currentScale) / 2;
            
            updateTransform();
        }

        function initMapInteractions() {
            const container = document.getElementById('mapContainer');
            
            container.addEventListener('mousedown', e => {
                if (e.button === 0) {
                    isDragging = true;
                    dragDistance = 0;
                    lastMouseX = e.clientX;
                    lastMouseY = e.clientY;
                    container.style.cursor = 'grabbing';
                }
            });

            window.addEventListener('mousemove', e => {
                if (isDragging) {
                    const dx = e.clientX - lastMouseX;
                    const dy = e.clientY - lastMouseY;
                    dragDistance += Math.abs(dx) + Math.abs(dy);
                    offsetX += dx;
                    offsetY += dy;
                    lastMouseX = e.clientX;
                    lastMouseY = e.clientY;
                    updateTransform();
                }
            });

            window.addEventListener('mouseup', () => {
                isDragging = false;
                container.style.cursor = 'crosshair';
            });

            container.addEventListener('wheel', e => {
                e.preventDefault();
                const rect = container.getBoundingClientRect();
                const centerX = e.clientX - rect.left;
                const centerY = e.clientY - rect.top;
                const factor = e.deltaY > 0 ? 0.9 : 1.1;
                zoomMap(factor, centerX, centerY);
            }, { passive: false });
        }

        function updateTransform() {
            const container = document.getElementById('mapContainer');
            const rect = container.getBoundingClientRect();
            
            const scaledMapWidth = mapWidth * currentScale;
            const scaledMapHeight = mapHeight * currentScale;

            // Restrict offsetX
            if (scaledMapWidth > rect.width) {
                // Map is wider than container, we can pan between 0 and (width - scaledWidth)
                // But since translate is negative, we want values between (rect.width - scaledMapWidth) and 0.
                offsetX = Math.min(0, Math.max(rect.width - scaledMapWidth, offsetX));
            } else {
                // Map is narrower than container: center it
                offsetX = (rect.width - scaledMapWidth) / 2;
            }

            // Restrict offsetY
            if (scaledMapHeight > rect.height) {
                // Map is taller than container, we can pan between 0 and (height - scaledHeight)
                offsetY = Math.min(0, Math.max(rect.height - scaledMapHeight, offsetY));
            } else {
                // Map is shorter than container: center it
                offsetY = (rect.height - scaledMapHeight) / 2;
            }

            const viewport = document.getElementById('map-viewport');
            viewport.style.transform = `translate(${offsetX}px, ${offsetY}px) scale(${currentScale})`;
            
            // Re-position marker to stay at correct coordinates relative to the panned/zoomed map
            const lat = parseFloat(document.getElementById('latInput').value);
            const lng = parseFloat(document.getElementById('lngInput').value);
            if (!isNaN(lat) && !isNaN(lng)) {
                updateMarkerFromCoords(lat, lng);
            }
        }

        function onMapClick(e) {
            if (dragDistance > 5) return;

            const svg = document.getElementById('map');
            const rect = svg.getBoundingClientRect();
            const x = (e.clientX - rect.left) / rect.width * mapWidth;
            const y = (e.clientY - rect.top) / rect.height * mapHeight;

            // Convert to lat/lng (equirectangular projection)
            currentLng = (x / mapWidth * 360) - 180;
            currentLat = 90 - (y / mapHeight * 180);

            document.getElementById('latInput').value = currentLat.toFixed(2);
            document.getElementById('lngInput').value = currentLng.toFixed(2);

            updateMarker(e.clientX - rect.left, e.clientY - rect.top);
            checkLocation();
        }

        function updateMarker(x, y) {
            const marker = document.getElementById('marker');
            const mapContainer = document.getElementById('mapContainer');
            const rect = mapContainer.getBoundingClientRect();
            const mapSvg = document.getElementById('map');
            if (!mapSvg) return;
            const svgRect = mapSvg.getBoundingClientRect();
            
            marker.style.display = 'block';
            marker.style.left = (svgRect.left - rect.left + x) + 'px';
            marker.style.top = (svgRect.top - rect.top + y) + 'px';
        }

        function updateMarkerFromCoords(lat, lng) {
            const svgX = ((lng + 180) / 360) * mapWidth;
            const svgY = ((90 - lat) / 180) * mapHeight;

            const screenX = svgX * currentScale + offsetX;
            const screenY = svgY * currentScale + offsetY;

            const marker = document.getElementById('marker');
            if (!marker) return;
            marker.style.display = 'block';
            marker.style.left = screenX + 'px';
            marker.style.top = screenY + 'px';
        }

        function zoomMap(factor, centerX, centerY) {
            const container = document.getElementById('mapContainer');
            const rect = container.getBoundingClientRect();
            
            if (centerX === undefined) centerX = rect.width / 2;
            if (centerY === undefined) centerY = rect.height / 2;

            const oldScale = currentScale;
            
            // Calculate minimum scale so the entire map fits
            const minScaleX = rect.width / mapWidth;
            const minScaleY = rect.height / mapHeight;
            const minScale = Math.min(minScaleX, minScaleY);
            
            currentScale *= factor;
            currentScale = Math.max(minScale, Math.min(10, currentScale));
            
            const actualFactor = currentScale / oldScale;
            offsetX = centerX - (centerX - offsetX) * actualFactor;
            offsetY = centerY - (centerY - offsetY) * actualFactor;
            
            updateTransform();
        }

        // Location functions
        function useMyLocation() {
            if (!navigator.geolocation) {
                showError('Geolocation is not supported');
                return;
            }

            navigator.geolocation.getCurrentPosition(
                pos => {
                    const lat = pos.coords.latitude;
                    const lng = pos.coords.longitude;
                    document.getElementById('latInput').value = lat.toFixed(2);
                    document.getElementById('lngInput').value = lng.toFixed(2);
                    updateMarkerFromCoords(lat, lng);
                    checkLocation();
                },
                err => showError('Could not get location: ' + err.message)
            );
        }

        async function checkLocation() {
            const lat = parseFloat(document.getElementById('latInput').value);
            const lng = parseFloat(document.getElementById('lngInput').value);

            if (isNaN(lat) || isNaN(lng)) {
                showError('Please enter valid coordinates');
                return;
            }

            hideError();

            try {
                const response = await fetch(`/api/v1/is-dark?lat=${lat}&lng=${lng}&detailed=true`, {
                    headers: { 'Accept': 'application/json' }
                });

                const data = await response.json();

                if (!response.ok) {
                    showError(data.message || 'Error checking location');
                    return;
                }

                showResult(data);
            } catch (e) {
                showError('Network error');
            }
        }

        function showResult(data) {
            showSidebar(data);
        }

        function showSidebar(data) {
            const sidebar = document.getElementById('sidebar');
            const sidebarContent = document.getElementById('sidebarContent');

            sidebar.classList.add('visible');

            const formatTime = (isoString) => {
                if (!isoString) return 'N/A';
                return new Date(isoString).toLocaleTimeString();
            };

            const formatDuration = (seconds) => {
                if (!seconds && seconds !== 0) return 'N/A';
                const hrs = Math.floor(seconds / 3600);
                const mins = Math.floor((seconds % 3600) / 60);
                return `${hrs}h ${mins}m`;
            };

            const getStateLabel = (state) => {
                return state.replace(/_/g, ' ');
            };

            let html = `
                <div class="info-group">
                    <div class="info-label">Current State</div>
                    <div class="info-value">
                        <span class="state-badge ${data.state || 'night'}">${getStateLabel(data.state || 'night')}</span>
                    </div>
                </div>

                <div class="info-group">
                    <div class="info-label">Sunrise</div>
                    <div class="info-value highlight">${formatTime(data.sunrise)}</div>
                </div>

                <div class="info-group">
                    <div class="info-label">Sunset</div>
                    <div class="info-value highlight">${formatTime(data.sunset)}</div>
                </div>

                <div class="info-group">
                    <div class="info-label">Solar Noon</div>
                    <div class="info-value">${formatTime(data.solar_noon)}</div>
                </div>

                <div class="info-group">
                    <div class="info-label">Day Length</div>
                    <div class="info-value">${formatDuration(data.day_length)}</div>
                </div>

                <div class="info-group">
                    <div class="info-label">Night Length</div>
                    <div class="info-value">${formatDuration(data.night_length)}</div>
                </div>

                <div class="info-group">
                    <div class="info-label">Civil Twilight</div>
                    <div class="info-value">${formatTime(data.civil_dawn)} - ${formatTime(data.civil_dusk)}</div>
                </div>

                <div class="info-group">
                    <div class="info-label">Nautical Twilight</div>
                    <div class="info-value">${formatTime(data.nautical_dawn)} - ${formatTime(data.nautical_dusk)}</div>
                </div>

                <div class="info-group">
                    <div class="info-label">Astronomical Twilight</div>
                    <div class="info-value">${formatTime(data.astronomical_dawn)} - ${formatTime(data.astronomical_dusk)}</div>
                </div>

                <div class="info-group">
                    <div class="info-label">Next Change</div>
                    <div class="info-value highlight">${data.next_change || 'N/A'}</div>
                </div>

                <div class="info-group">
                    <div class="info-label">Polar Day/Night</div>
                    <div class="info-value">
                        ${data.is_polar_day ? '<span style="color:#f59e0b">☀️ Polar Day</span>' : ''}
                        ${data.is_polar_night ? '<span style="color:#4a9eff">🌙 Polar Night</span>' : ''}
                        ${!data.is_polar_day && !data.is_polar_night ? 'Normal cycle' : ''}
                    </div>
                </div>
            `;

            sidebarContent.innerHTML = html;
        }

        function clearAll() {
            document.getElementById('cityInput').value = '';
            document.getElementById('latInput').value = '';
            document.getElementById('lngInput').value = '';
            document.getElementById('sidebar').classList.remove('visible');
            hideError();
        }

        function showError(msg) {
            document.getElementById('error').textContent = msg;
        }

        function hideError() {
            document.getElementById('error').textContent = '';
        }

        // Autocomplete
        const cityInput = document.getElementById('cityInput');
        const autocompleteList = document.getElementById('autocompleteList');

        cityInput.addEventListener('input', function() {
            const val = this.value.toLowerCase();
            if (!val) {
                autocompleteList.style.display = 'none';
                return;
            }

            const matches = cities.filter(c =>
                c.name.toLowerCase().includes(val)
            ).slice(0, 10);

            if (matches.length === 0) {
                autocompleteList.style.display = 'none';
                return;
            }

            autocompleteList.innerHTML = '';
            matches.forEach(c => {
                const div = document.createElement('div');
                div.className = 'autocomplete-item';
                div.textContent = `${c.name}, ${c.country}`;
                div.addEventListener('click', () => selectCity(c.name, c.lat, c.lng));
                autocompleteList.appendChild(div);
            });
            autocompleteList.style.display = 'block';
        });

        function selectCity(name, lat, lng) {
            cityInput.value = name;
            document.getElementById('latInput').value = lat.toFixed(2);
            document.getElementById('lngInput').value = lng.toFixed(2);
            autocompleteList.style.display = 'none';
            updateMarkerFromCoords(lat, lng);
            checkLocation();
        }

        document.addEventListener('click', function(e) {
            if (!e.target.closest('.autocomplete')) {
                autocompleteList.style.display = 'none';
            }
        });
    </script>
</body>
</html>
